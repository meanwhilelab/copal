<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/copal-favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/copal-favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/copal-apple-touch-icon-180.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#3F4043" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Belt-and-braces: X-Robots-Tag header (server) is the real gate; this
         covers any path that ever serves this shell without the header. -->
    <meta name="robots" content="noindex, nofollow" />
    <title>Copal</title>
      <script>
      // One-time key migration (the app was renamed Amber → Copal) so existing
      // sessions and preferences survive. Runs before anything reads a key.
      ["token", "theme", "ws", "board"].forEach(function (k) {
        var old = localStorage.getItem("amber_" + k);
        if (old !== null && localStorage.getItem("copal_" + k) === null) {
          localStorage.setItem("copal_" + k, old);
        }
      });
      document.documentElement.dataset.theme = localStorage.getItem("copal_theme") || "light";
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
